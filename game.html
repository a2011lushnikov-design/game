<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Brawl Mini</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        html,body{width:100%;height:100%;overflow:hidden;background:#0d1b0d;font-family:'Segoe UI',system-ui,sans-serif;user-select:none;-webkit-user-select:none;touch-action:manipulation}
        body{display:flex;flex-direction:column;align-items:center;justify-content:center}
        #container{position:relative;width:100vw;height:100vw;max-width:500px;max-height:500px;margin:0 auto;background:#1a3a1a;border-radius:16px;overflow:hidden;box-shadow:0 0 30px rgba(0,180,0,.3)}
        canvas{display:block;width:100%;height:100%}
        #ui-top{position:absolute;top:6px;left:6px;right:6px;display:flex;justify-content:space-between;pointer-events:none;z-index:10;gap:4px}
        .badge{background:rgba(0,0,0,.75);color:#fff;padding:4px 10px;border-radius:14px;font-size:12px;font-weight:bold;display:flex;align-items:center;gap:4px}
        .badge.r{color:#ff5555}.badge.g{color:#ffd700}.badge.b{color:#a0d2ff}
        #overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;z-index:20;flex-direction:column;gap:10px}
        #overlay h1{font-size:24px;color:#ffd700;text-shadow:0 0 20px rgba(255,215,0,.5)}
        #overlay p{color:#aaa;font-size:12px;text-align:center;padding:0 15px}
        .bbtn{background:linear-gradient(135deg,#f0a500,#ffd000);color:#000;border:none;padding:10px 25px;border-radius:25px;font-size:14px;font-weight:bold;cursor:pointer}
        .bbtn:active{transform:scale(.93)}
        #joystick{position:absolute;bottom:30px;left:30px;width:80px;height:80px;background:rgba(255,255,255,.1);border-radius:50%;border:2px solid rgba(255,255,255,.2);z-index:15;display:flex;align-items:center;justify-content:center}
        #joystick-knob{width:35px;height:35px;background:rgba(255,255,255,.4);border-radius:50%}
        #attack-btn{position:absolute;bottom:40px;right:30px;width:60px;height:60px;background:rgba(255,80,80,.3);border-radius:50%;border:2px solid rgba(255,100,100,.5);z-index:15;display:flex;align-items:center;justify-content:center;font-size:20px}
    </style>
</head>
<body>
    <div id="container">
        <canvas id="game"></canvas>
        <div id="ui-top">
            <div class="badge r">❤️<span id="hp">100</span></div>
            <div class="badge g">🪙<span id="score">0</span></div>
            <div class="badge b">🌊<span id="wave">1</span></div>
        </div>
        <div id="joystick"><div id="joystick-knob"></div></div>
        <div id="attack-btn">⚔️</div>
        <div id="overlay">
            <h1>⚔️ BRAWL MINI</h1>
            <p>📱 Джойстик + кнопка атаки<br>⌨️ WASD + пробел(рывок)<br>Укрытия защищают от врагов!</p>
            <button class="bbtn" onclick="startGame()">ИГРАТЬ</button>
        </div>
    </div>

    <script>
        const tg=window.Telegram.WebApp;tg.expand();
        const canvas=document.getElementById('game');
        const ctx=canvas.getContext('2d');
        const joystick=document.getElementById('joystick');
        const knob=document.getElementById('joystick-knob');
        const attackBtn=document.getElementById('attack-btn');
        
        let W,H;
        function resize(){
            let s=Math.min(window.innerWidth,window.innerHeight,500);
            document.getElementById('container').style.width=s+'px';
            document.getElementById('container').style.height=s+'px';
            canvas.width=s;canvas.height=s;
            W=s;H=s;
        }
        resize();window.addEventListener('resize',resize);

        let player,enemies=[],crystals=[],walls=[],particles=[],bullets=[];
        let score=0,wave=1,gameRunning=false,gameOver=false;
        let joyActive=false,joyX=0,joyY=0,joyBaseX=0,joyBaseY=0;
        let attackPressed=false,attackCooldown=0;
        let keys={w:false,a:false,s:false,d:false,space:false};
        let dashCooldown=0,weaponLevel=1;
        let joystickId=null,attackTouchId=null;

        function buildWalls(){
            walls=[];
            [[W*.25,H*.2,W*.06,H*.12],[W*.55,H*.18,W*.1,H*.06],[W*.35,H*.45,W*.05,H*.12],
             [W*.7,H*.4,W*.08,H*.08],[W*.15,H*.6,W*.12,H*.05],[W*.5,H*.65,W*.07,H*.1],
             [W*.8,H*.7,W*.08,H*.08],[W*.25,H*.8,W*.1,H*.06]].forEach(p=>walls.push({x:p[0],y:p[1],w:p[2],h:p[3]}));
        }

        function collideWall(x,y,r){
            for(let w of walls){
                let cx=Math.max(w.x,Math.min(x,w.x+w.w));
                let cy=Math.max(w.y,Math.min(y,w.y+w.h));
                if(Math.hypot(x-cx,y-cy)<r)return true;
            }
            return false;
        }

        function pushOut(x,y,r){
            for(let w of walls){
                let cx=Math.max(w.x,Math.min(x,w.x+w.w));
                let cy=Math.max(w.y,Math.min(y,w.y+w.h));
                let dx=x-cx,dy=y-cy,d=Math.hypot(dx,dy);
                if(d<r&&d>0){x=cx+dx/d*r;y=cy+dy/d*r;}
            }
            return{x,y};
        }

        function spawnEnemy(){
            let side=Math.floor(Math.random()*4);
            let ex,ey,m=W*.08;
            if(side===0){ex=Math.random()*W;ey=-m}else if(side===1){ex=W+m;ey=Math.random()*H}
            else if(side===2){ex=Math.random()*W;ey=H+m}else{ex=-m;ey=Math.random()*H}
            let hp=10+wave*5,speed=W/500+wave*.015;
            enemies.push({x:ex,y:ey,r:W/30,hp,maxHp:hp,speed,damage:6+wave*3,attackCd:0,color:'#e53935'});
        }

        function spawnCrystal(){
            for(let i=0;i<30;i++){
                let cx=W*.05+Math.random()*W*.9,cy=H*.05+Math.random()*H*.9;
                if(!collideWall(cx,cy,W/40)&&!walls.some(w=>cx>w.x&&cx<w.x+w.w&&cy>w.y&&cy<w.y+w.h)){
                    crystals.push({x:cx,y:cy,r:W/55,value:8+wave*3});break;
                }
            }
        }

        function startWave(){
            enemies=[];crystals=[];
            for(let i=0;i<3+wave;i++)spawnEnemy();
            for(let i=0;i<5;i++)spawnCrystal();
            wave++;document.getElementById('wave').textContent=wave;
        }

        function startGame(){
            player={x:W/2,y:H/2,r:W/22,speed:W/160,hp:100,maxHp:100,inv:0};
            score=0;wave=0;enemies=[];crystals=[];particles=[];bullets=[];gameOver=false;gameRunning=true;
            weaponLevel=1;attackCooldown=0;dashCooldown=0;
            buildWalls();startWave();
            document.getElementById('overlay').style.display='none';
            updateUI();
        }

        function endGame(){
            gameRunning=false;gameOver=true;
            document.getElementById('overlay').innerHTML=`<h1>💀</h1><p>Волна ${wave-1}<br>🪙 ${score}</p><button class="bbtn" onclick="startGame()">ЗАНОВО</button>`;
            document.getElementById('overlay').style.display='flex';
        }

        function updateUI(){
            document.getElementById('hp').textContent=Math.max(0,player.hp);
            document.getElementById('score').textContent=score;
        }

        function shoot(){
            if(!gameRunning||attackCooldown>0)return;
            attackCooldown=25;
            let nearest=null,minD=W*.3;
            enemies.forEach(e=>{let d=Math.hypot(player.x-e.x,player.y-e.y);if(d<minD){minD=d;nearest=e}});
            if(nearest){
                let dx=nearest.x-player.x,dy=nearest.y-player.y,d=Math.hypot(dx,dy);
                bullets.push({x:player.x,y:player.y,vx:dx/d*W/80,vy:dy/d*W/80,damage:12*weaponLevel});
                for(let i=0;i<2;i++)particles.push({x:player.x,y:player.y,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,life:10,color:'#ffcc00'});
            }
        }

        function dash(){
            if(!gameRunning||dashCooldown>0)return;
            dashCooldown=45;
            let dx=0,dy=0;
            if(joyActive){dx=joyX;dy=joyY}
            else{if(keys.w||keys.ArrowUp)dy=-1;if(keys.s||keys.ArrowDown)dy=1;if(keys.a||keys.ArrowLeft)dx=-1;if(keys.d||keys.ArrowRight)dx=1}
            if(dx===0&&dy===0)dx=1;
            let d=Math.hypot(dx,dy);
            player.x+=dx/d*W*.08;player.y+=dy/d*W*.08;
            let p=pushOut(player.x,player.y,player.r);player.x=p.x;player.y=p.y;
            player.inv=8;
            for(let i=0;i<6;i++)particles.push({x:player.x,y:player.y,vx:(Math.random()-.5)*5,vy:(Math.random()-.5)*5,life:12,color:'#fff'});
        }

        // Джойстик
        joystick.addEventListener('touchstart',e=>{e.preventDefault();
            let t=e.changedTouches[0];joyBaseX=t.clientX;joyBaseY=t.clientY;
            joyActive=true;joystickId=t.identifier;
        });
        joystick.addEventListener('touchmove',e=>{e.preventDefault();
            for(let t of e.changedTouches){if(t.identifier===joystickId){
                let dx=t.clientX-joyBaseX,dy=t.clientY-joyBaseY,d=Math.hypot(dx,dy);
                let maxR=35;if(d>maxR){dx=dx/d*maxR;dy=dy/d*maxR}
                knob.style.transform=`translate(${dx}px,${dy}px)`;
                joyX=dx/maxR;joyY=dy/maxR;
            }}
        });
        joystick.addEventListener('touchend',e=>{e.preventDefault();
            for(let t of e.changedTouches){if(t.identifier===joystickId){
                joyActive=false;joyX=0;joyY=0;knob.style.transform='translate(0,0)';
            }}
        });

        // Кнопка атаки
        attackBtn.addEventListener('touchstart',e=>{e.preventDefault();attackPressed=true;attackTouchId=e.changedTouches[0].identifier;shoot();});
        attackBtn.addEventListener('touchend',e=>{e.preventDefault();attackPressed=false;});

        // Клавиатура
        document.addEventListener('keydown',e=>{
            if(e.key==='w'||e.key==='ArrowUp')keys.w=true;
            if(e.key==='s'||e.key==='ArrowDown')keys.s=true;
            if(e.key==='a'||e.key==='ArrowLeft')keys.a=true;
            if(e.key==='d'||e.key==='ArrowRight')keys.d=true;
            if(e.key===' ')dash();
        });
        document.addEventListener('keyup',e=>{
            if(e.key==='w'||e.key==='ArrowUp')keys.w=false;
            if(e.key==='s'||e.key==='ArrowDown')keys.s=false;
            if(e.key==='a'||e.key==='ArrowLeft')keys.a=false;
            if(e.key==='d'||e.key==='ArrowRight')keys.d=false;
        });

        function update(){
            if(!gameRunning)return;
            // Движение
            let dx=0,dy=0;
            if(joyActive){dx=joyX;dy=joyY}
            else{
                if(keys.w||keys.ArrowUp)dy=-1;if(keys.s||keys.ArrowDown)dy=1;
                if(keys.a||keys.ArrowLeft)dx=-1;if(keys.d||keys.ArrowRight)dx=1;
            }
            if(dx!==0||dy!==0){
                let d=Math.hypot(dx,dy);
                player.x+=dx/d*player.speed;player.y+=dy/d*player.speed;
                let p=pushOut(player.x,player.y,player.r);player.x=p.x;player.y=p.y;
            }
            player.x=Math.max(player.r,Math.min(W-player.r,player.x));
            player.y=Math.max(player.r,Math.min(H-player.r,player.y));

            // Атака
            if(attackPressed)shoot();
            if(attackCooldown>0)attackCooldown--;
            if(dashCooldown>0)dashCooldown--;
            if(player.inv>0)player.inv--;

            // Враги
            enemies.forEach(e=>{
                // Ищем путь вокруг стен
                let dx=player.x-e.x,dy=player.y-e.y,d=Math.hypot(dx,dy);
                if(d>0){
                    let nx=dx/d,ny=dy/d;
                    // Проверяем прямую видимость
                    let blocked=false;
                    for(let w of walls){
                        // Луч пересекает стену?
                        let tMin=0,tMax=1;
                        if(Math.abs(dx)>0.001){
                            let t1=(w.x-e.x)/dx,t2=(w.x+w.w-e.x)/dx;
                            let tMinX=Math.min(t1,t2),tMaxX=Math.max(t1,t2);
                            tMin=Math.max(tMin,tMinX);tMax=Math.min(tMax,tMaxX);
                        }
                        if(Math.abs(dy)>0.001){
                            let t1=(w.y-e.y)/dy,t2=(w.y+w.h-e.y)/dy;
                            let tMinY=Math.min(t1,t2),tMaxY=Math.max(t1,t2);
                            tMin=Math.max(tMin,tMinY);tMax=Math.min(tMax,tMaxY);
                        }
                        if(tMin<tMax&&tMin<1&&tMax>0){blocked=true;break}
                    }
                    if(!blocked&&d<W*.35){e.x+=nx*e.speed;e.y+=ny*e.speed}
                }
                // Атака
                if(Math.hypot(player.x-e.x,player.y-e.y)<e.r+player.r&&e.attackCd<=0&&player.inv<=0){
                    player.hp-=e.damage;player.inv=12;e.attackCd=35;
                    for(let i=0;i<3;i++)particles.push({x:player.x,y:player.y,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:8,color:'#ff4444'});
                }
                if(e.attackCd>0)e.attackCd--;
            });

            // Пули
            bullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy});
            bullets=bullets.filter(b=>b.x>0&&b.x<W&&b.y>0&&b.y<H);
            enemies.forEach(e=>{
                bullets=bullets.filter(b=>{
                    if(Math.hypot(b.x-e.x,b.y-e.y)<e.r+W/60){
                        e.hp-=b.damage;
                        for(let i=0;i<2;i++)particles.push({x:b.x,y:b.y,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,life:6,color:'#ff0'});
                        return false;
                    }
                    return true;
                });
            });

            // Кристаллы
            crystals=crystals.filter(c=>{
                if(Math.hypot(player.x-c.x,player.y-c.y)<player.r+c.r){score+=c.value;return false}
                return true;
            });

            // Частицы
            particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--});
            particles=particles.filter(p=>p.life>0);

            // Удаление врагов
            enemies=enemies.filter(e=>{
                if(e.hp<=0){score+=5+wave;spawnCrystal();for(let i=0;i<5;i++)particles.push({x:e.x,y:e.y,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:10,color:'#ffd700'});return false}
                return true;
            });

            if(enemies.length===0)startWave();
            if(player.hp<=0)endGame();
            updateUI();
        }

        function draw(){
            ctx.clearRect(0,0,W,H);
            ctx.fillStyle='#388E3C';ctx.fillRect(0,0,W,H);
            // Сетка
            ctx.fillStyle='#2E7D32';
            for(let x=0;x<W;x+=W/10)for(let y=0;y<H;y+=H/10)if((x+y)%(W/5)<2)ctx.fillRect(x,y,3,3);
            // Стены
            walls.forEach(w=>{
                ctx.fillStyle='#5D4037';ctx.fillRect(w.x,w.y,w.w,w.h);
                ctx.fillStyle='#4E342E';ctx.fillRect(w.x+2,w.y+2,w.w-4,w.h-4);
            });
            // Кристаллы
            crystals.forEach(c=>{
                ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(c.x,c.y,c.r,0,Math.PI*2);ctx.fill();
                ctx.fillStyle='#FFF8E1';ctx.beginPath();ctx.arc(c.x-c.r*.2,c.y-c.r*.3,c.r*.35,0,Math.PI*2);ctx.fill();
            });
            // Пули
            bullets.forEach(b=>{ctx.fillStyle='#FFEB3B';ctx.beginPath();ctx.arc(b.x,b.y,W/120,0,Math.PI*2);ctx.fill()});
            // Враги
            enemies.forEach(e=>{
                ctx.fillStyle=e.color;ctx.beginPath();ctx.arc(e.x,e.y,e.r,0,Math.PI*2);ctx.fill();
                ctx.fillStyle='#b71c1c';ctx.beginPath();ctx.arc(e.x,e.y,e.r*.7,0,Math.PI*2);ctx.fill();
                // HP
                let bw=e.r*1.3;ctx.fillStyle='#333';ctx.fillRect(e.x-bw/2,e.y-e.r-7,bw,5);
                ctx.fillStyle='#f44336';ctx.fillRect(e.x-bw/2,e.y-e.r-7,bw*(e.hp/e.maxHp),5);
            });
            // Игрок
            if(player.inv%6<3){
                ctx.fillStyle='#1976D2';ctx.beginPath();ctx.arc(player.x,player.y,player.r,0,Math.PI*2);ctx.fill();
                ctx.fillStyle='#0D47A1';ctx.beginPath();ctx.arc(player.x,player.y,player.r*.65,0,Math.PI*2);ctx.fill();
                ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(player.x,player.y-player.r*.2,player.r*.45,Math.PI,0);ctx.fill();
                ctx.fillStyle='#000';ctx.beginPath();ctx.arc(player.x-player.r*.25,player.y-player.r*.2,player.r*.08,0,Math.PI*2);ctx.fill();
                ctx.beginPath();ctx.arc(player.x+player.r*.25,player.y-player.r*.2,player.r*.08,0,Math.PI*2);ctx.fill();
            }
            // Частицы
            particles.forEach(p=>{ctx.globalAlpha=p.life/12;ctx.fillStyle=p.color;ctx.fillRect(p.x-2,p.y-2,4,4)});
            ctx.globalAlpha=1;
        }

        function loop(){update();draw();requestAnimationFrame(loop)}
        loop();
    </script>
</body>
</html>
