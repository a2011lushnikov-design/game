<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Game Farmer — 6 игр</title>
    <style>
        :root {
            --bg: #0d0d14;
            --card: #16161f;
            --border: #252530;
            --text: #ddd;
            --green: #00e676;
            --gold: #ffd740;
            --blue: #448aff;
            --red: #ff5252;
            --purple: #b388ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }
        header h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--green), var(--blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        header p { color: #888; font-size: 14px; margin-top: 4px; }

        .controls {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: -0.2px;
        }
        .btn-start { background: var(--green); color: #000; }
        .btn-start:hover { box-shadow: 0 0 24px rgba(0,230,118,0.5); transform: translateY(-1px); }
        .btn-stop { background: var(--red); color: #fff; }
        .btn-stop:hover { box-shadow: 0 0 24px rgba(255,82,82,0.5); }
        .btn-bonus { background: var(--gold); color: #000; }
        .btn-bonus:hover { box-shadow: 0 0 24px rgba(255,215,64,0.5); }
        .btn-reset { background: #444; color: #fff; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

        .status-bar {
            text-align: center;
            margin-bottom: 16px;
            font-size: 15px;
        }
        .status-dot {
            display: inline-block;
            width: 10px; height: 10px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .online { background: var(--green); box-shadow: 0 0 10px var(--green); }
        .offline { background: var(--red); }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .game-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            transition: all 0.3s;
        }
        .game-card.active { border-color: var(--green); }
        .game-card.farming { border-color: var(--gold); box-shadow: 0 0 16px rgba(255,215,64,0.15); }

        .game-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
        }
        .game-icon {
            width: 44px; height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .game-name { font-size: 17px; font-weight: 700; }
        .game-status {
            margin-left: auto;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }
        .status-farming { background: rgba(255,215,64,0.15); color: var(--gold); }
        .status-idle { background: rgba(255,255,255,0.05); color: #888; }

        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }
        .stat {
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }
        .stat-value { font-size: 18px; font-weight: 700; color: var(--gold); }
        .stat-label { font-size: 11px; color: #777; margin-top: 2px; }

        .progress-wrap { margin: 10px 0; }
        .progress-bar {
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 3px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--green), var(--blue));
            border-radius: 3px;
            transition: width 0.4s;
        }
        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #777;
            margin-top: 4px;
        }

        .log-area {
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            height: 150px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 11px;
            line-height: 1.8;
            color: #999;
            margin-top: 16px;
        }
        .log-area .log-tap { color: var(--green); }
        .log-area .log-bonus { color: var(--gold); }
        .log-area .log-energy { color: var(--blue); }
        .log-area .log-error { color: var(--red); }

        .total-stats {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 24px;
        }
        .total-stat {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 24px;
            text-align: center;
            min-width: 120px;
        }
        .total-stat .ts-val { font-size: 24px; font-weight: 800; color: var(--green); }
        .total-stat .ts-lbl { font-size: 12px; color: #888; }

        @media (max-width: 600px) {
            .games-grid { grid-template-columns: 1fr; }
            .btn { padding: 10px 18px; font-size: 13px; }
        }
    </style>
</head>
<body>

<header>
    <h1>🎮 Telegram Game Farmer</h1>
    <p>Тапает 6 игр одновременно • Доход $50-500 при листинге каждой</p>
</header>

<div class="controls">
    <button class="btn btn-start" id="btnStart" onclick="startAll()">▶ Запустить все игры</button>
    <button class="btn btn-stop" id="btnStop" onclick="stopAll()" disabled>⏹ Остановить</button>
    <button class="btn btn-bonus" onclick="collectAllBonuses()">🎁 Собрать все бонусы</button>
    <button class="btn btn-reset" onclick="resetAll()">🔄 Сброс</button>
</div>

<div class="status-bar">
    <span class="status-dot offline" id="globalDot"></span>
    <span id="globalStatus">Бот остановлен</span>
    <span style="margin-left:16px;color:#888;">| Общий фарм: <b id="globalTaps" style="color:var(--gold);">0</b> тапов</span>
</div>

<div class="games-grid" id="gamesGrid"></div>

<div class="total-stats">
    <div class="total-stat"><div class="ts-val" id="totalCoins">0</div><div class="ts-lbl">Всего монет</div></div>
    <div class="total-stat"><div class="ts-val" id="totalTaps">0</div><div class="ts-lbl">Всего тапов</div></div>
    <div class="total-stat"><div class="ts-val" id="estIncome">$0</div><div class="ts-lbl">Ожидаемый доход</div></div>
</div>

<div class="log-area" id="logArea">
    <span style="color:#555;">[Система] Панель готова. Нажмите "Запустить все игры".</span>
</div>

<script>
    // ═══════════════ КОНФИГ ИГР ═══════════════
    const GAMES = [
        {
            id: 'blum', name: 'Blum', icon: '🌸', color: '#7c4dff',
            tapsPerCycle: 150, tapDelay: 50, energyMax: 500, energyRegen: 1,
            dailyBonus: 500, coinsPerTap: 1,
        },
        {
            id: 'tapswap', name: 'TapSwap', icon: '🔄', color: '#00bcd4',
            tapsPerCycle: 200, tapDelay: 40, energyMax: 600, energyRegen: 2,
            dailyBonus: 1000, coinsPerTap: 1,
        },
        {
            id: 'hamster', name: 'Hamster Kombat', icon: '🐹', color: '#ff9800',
            tapsPerCycle: 100, tapDelay: 60, energyMax: 400, energyRegen: 1.5,
            dailyBonus: 750, coinsPerTap: 2,
        },
        {
            id: 'catizen', name: 'Catizen', icon: '🐱', color: '#e91e63',
            tapsPerCycle: 120, tapDelay: 55, energyMax: 450, energyRegen: 1.2,
            dailyBonus: 600, coinsPerTap: 1,
        },
        {
            id: 'yescoin', name: 'Yescoin', icon: '✅', color: '#4caf50',
            tapsPerCycle: 180, tapDelay: 35, energyMax: 550, energyRegen: 1.8,
            dailyBonus: 900, coinsPerTap: 1,
        },
        {
            id: 'notcoin', name: 'Notcoin', icon: '💎', color: '#2196f3',
            tapsPerCycle: 160, tapDelay: 45, energyMax: 500, energyRegen: 1,
            dailyBonus: 800, coinsPerTap: 1,
        },
    ];

    // ═══════════════ СОСТОЯНИЕ ═══════════════
    let isRunning = false;
    let gameStates = {};
    let globalTaps = 0;
    let totalCoinsAll = 0;
    let intervals = {};
    let energyIntervals = {};

    // Инициализация
    GAMES.forEach(g => {
        gameStates[g.id] = {
            coins: 0,
            taps: 0,
            energy: g.energyMax,
            energyMax: g.energyMax,
            farming: false,
            bonusCollected: false,
        };
    });

    // ═══════════════ РЕНДЕР ═══════════════
    function renderGames() {
        const grid = document.getElementById('gamesGrid');
        grid.innerHTML = GAMES.map(g => {
            const s = gameStates[g.id];
            const energyPct = (s.energy / s.energyMax * 100).toFixed(0);
            return `
                <div class="game-card ${s.farming ? 'farming' : ''}">
                    <div class="game-header">
                        <div class="game-icon" style="background:${g.color}22;color:${g.color};">${g.icon}</div>
                        <div class="game-name">${g.name}</div>
                        <div class="game-status ${s.farming ? 'status-farming' : 'status-idle'}">
                            ${s.farming ? '⚡ ФАРМ' : '💤 Ожидание'}
                        </div>
                    </div>
                    <div class="stats-row">
                        <div class="stat">
                            <div class="stat-value">${s.coins.toLocaleString()}</div>
                            <div class="stat-label">Монет</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value">${s.taps.toLocaleString()}</div>
                            <div class="stat-label">Тапов</div>
                        </div>
                    </div>
                    <div class="progress-wrap">
                        <div class="progress-bar">
                            <div class="progress-fill" style="width:${energyPct}%;background:${g.color};"></div>
                        </div>
                        <div class="progress-label">
                            <span>⚡ ${Math.floor(s.energy)}/${s.energyMax}</span>
                            <span>+${g.energyRegen}/сек</span>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    function updateTotals() {
        totalCoinsAll = GAMES.reduce((sum, g) => sum + gameStates[g.id].coins, 0);
        document.getElementById('totalCoins').textContent = totalCoinsAll.toLocaleString();
        document.getElementById('totalTaps').textContent = globalTaps.toLocaleString();
        // Примерная оценка: 100000 монет = $1-5 при листинге
        const estUSD = (totalCoinsAll / 100000 * 3).toFixed(0);
        document.getElementById('estIncome').textContent = '$' + estUSD;
        document.getElementById('globalTaps').textContent = globalTaps.toLocaleString();
    }

    function addLog(type, msg) {
        const log = document.getElementById('logArea');
        const time = new Date().toLocaleTimeString();
        const cls = { tap: 'log-tap', bonus: 'log-bonus', energy: 'log-energy', error: 'log-error' };
        log.innerHTML += `\n<span class="${cls[type] || ''}">[${time}] ${msg}</span>`;
        log.scrollTop = log.scrollHeight;
        if (log.children.length > 80) log.removeChild(log.firstChild);
    }

    // ═══════════════ ФАРМ ОДНОЙ ИГРЫ ═══════════════
    async function farmGame(gameId) {
        const game = GAMES.find(g => g.id === gameId);
        const state = gameStates[gameId];

        if (!state.farming) return;

        // Проверка энергии
        if (state.energy < game.tapDelay / 10) {
            addLog('energy', `${game.name}: ⚡ Мало энергии, ждём восстановления...`);
            return;
        }

        // Симуляция тапов
        const tapsToDo = Math.min(game.tapsPerCycle, Math.floor(state.energy));
        for (let i = 0; i < tapsToDo; i++) {
            if (!state.farming) break;
            state.energy -= 0.5;
            state.taps++;
            state.coins += game.coinsPerTap;
            globalTaps++;
            await sleep(game.tapDelay);
        }

        addLog('tap', `${game.name}: +${tapsToDo} тапов | Монет: ${state.coins.toLocaleString()} | Энергия: ${Math.floor(state.energy)}`);
        updateTotals();
        renderGames();
    }

    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }

    // ═══════════════ ВОССТАНОВЛЕНИЕ ЭНЕРГИИ ═══════════════
    function regenEnergy(gameId) {
        const game = GAMES.find(g => g.id === gameId);
        const state = gameStates[gameId];
        state.energy = Math.min(state.energy + game.energyRegen, state.energyMax);
        renderGames();
    }

    // ═══════════════ ЗАПУСК ОДНОЙ ИГРЫ ═══════════════
    function startGame(gameId) {
        const game = GAMES.find(g => g.id === gameId);
        const state = gameStates[gameId];
        if (state.farming) return;

        state.farming = true;
        state.energy = game.energyMax;
        addLog('tap', `${game.name}: 🟢 Запущен фарм`);

        // Цикл тапов
        intervals[gameId] = setInterval(() => farmGame(gameId), game.tapsPerCycle * game.tapDelay + 200);

        // Восстановление энергии
        energyIntervals[gameId] = setInterval(() => regenEnergy(gameId), 1000);

        renderGames();
    }

    function stopGame(gameId) {
        const state = gameStates[gameId];
        state.farming = false;
        if (intervals[gameId]) clearInterval(intervals[gameId]);
        if (energyIntervals[gameId]) clearInterval(energyIntervals[gameId]);
        addLog('tap', `${GAMES.find(g => g.id === gameId).name}: 🔴 Остановлен`);
        renderGames();
    }

    // ═══════════════ УПРАВЛЕНИЕ ВСЕМИ ═══════════════
    function startAll() {
        if (isRunning) return;
        isRunning = true;

        GAMES.forEach(g => startGame(g.id));

        document.getElementById('btnStart').disabled = true;
        document.getElementById('btnStop').disabled = false;
        document.getElementById('globalDot').className = 'status-dot online';
        document.getElementById('globalStatus').textContent = '⚡ Фарм активен (6 игр)';
        addLog('bonus', '🚀 Все 6 игр запущены! Фарм 24/7.');
    }

    function stopAll() {
        isRunning = false;
        GAMES.forEach(g => stopGame(g.id));

        document.getElementById('btnStart').disabled = false;
        document.getElementById('btnStop').disabled = true;
        document.getElementById('globalDot').className = 'status-dot offline';
        document.getElementById('globalStatus').textContent = 'Бот остановлен';
        addLog('tap', '⏹ Все игры остановлены.');
    }

    function collectAllBonuses() {
        let totalBonus = 0;
        GAMES.forEach(g => {
            const state = gameStates[g.id];
            if (!state.bonusCollected) {
                state.coins += g.dailyBonus;
                state.bonusCollected = true;
                totalBonus += g.dailyBonus;
                addLog('bonus', `${g.name}: 🎁 +${g.dailyBonus} бонусных монет`);
            }
        });
        if (totalBonus === 0) {
            addLog('bonus', 'ℹ️ Все бонусы уже собраны сегодня.');
        } else {
            addLog('bonus', `🎁 Всего собрано бонусов: ${totalBonus.toLocaleString()} монет`);
        }
        updateTotals();
        renderGames();

        // Сброс флага бонуса через 24 часа
        setTimeout(() => {
            GAMES.forEach(g => { gameStates[g.id].bonusCollected = false; });
            addLog('bonus', '🔄 Бонусы снова доступны!');
        }, 24 * 60 * 60 * 1000);
    }

    function resetAll() {
        if (isRunning) stopAll();
        GAMES.forEach(g => {
            gameStates[g.id] = {
                coins: 0, taps: 0,
                energy: g.energyMax, energyMax: g.energyMax,
                farming: false, bonusCollected: false,
            };
        });
        globalTaps = 0;
        totalCoinsAll = 0;
        updateTotals();
        renderGames();
        document.getElementById('logArea').innerHTML = '<span style="color:#555;">[Система] Сброшено. Нажмите "Запустить все игры".</span>';
    }

    // ═══════════════ АВТО-БОНУС КАЖДЫЕ 24Ч ═══════════════
    setInterval(() => {
        if (isRunning) collectAllBonuses();
    }, 24 * 60 * 60 * 1000);

    // ═══════════════ СОХРАНЕНИЕ В localStorage ═══════════════
    function saveState() {
        localStorage.setItem('gameFarmer', JSON.stringify({
            gameStates, globalTaps, totalCoinsAll, isRunning
        }));
    }

    function loadState() {
        const saved = localStorage.getItem('gameFarmer');
        if (saved) {
            const data = JSON.parse(saved);
            gameStates = data.gameStates;
            globalTaps = data.globalTaps;
            totalCoinsAll = data.totalCoinsAll;
            updateTotals();
            renderGames();
            if (data.isRunning) {
                document.getElementById('btnStart').disabled = true;
                document.getElementById('btnStop').disabled = false;
                document.getElementById('globalDot').className = 'status-dot online';
                document.getElementById('globalStatus').textContent = '⚡ Фарм активен (восстановлен)';
                isRunning = true;
                GAMES.forEach(g => startGame(g.id));
                addLog('bonus', '🔄 Состояние восстановлено. Фарм продолжается.');
            }
        }
    }

    setInterval(saveState, 30000);

    // ═══════════════ СТАРТ ═══════════════
    renderGames();
    updateTotals();
    loadState();
    addLog('bonus', '💡 Нажмите "Запустить все игры" для старта фарма 24/7.');
    addLog('bonus', '💰 При листинге монеты обмениваются на реальные деньги.');
    addLog('bonus', '📊 Ожидаемый доход: $50-500 с каждой игры.');
</script>

</body>
</html>
