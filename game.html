<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Brawl Stars Mini</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;outline:none}
        html,body{width:100%;height:100%;overflow:hidden;background:#1a3a1a;font-family:'Segoe UI',system-ui,sans-serif;user-select:none;-webkit-user-select:none;touch-action:manipulation}
        body{display:flex;flex-direction:column;align-items:center;justify-content:center}
        #container{position:relative;width:100vw;height:100vw;max-width:500px;max-height:500px;margin:0 auto;background:#2b5e2b;border-radius:20px;overflow:hidden;box-shadow:0 0 30px rgba(0,200,0,.3)}
        canvas{display:block;width:100%;height:100%}
        #ui-top{position:absolute;top:8px;left:8px;right:8px;display:flex;justify-content:space-between;pointer-events:none;z-index:10;gap:6px;flex-wrap:wrap}
        .badge{background:rgba(0,0,0,.7);color:#fff;padding:5px 10px;border-radius:20px;font-size:13px;font-weight:bold;backdrop-filter:blur(6px);display:flex;align-items:center;gap:5px}
        .badge.hp{color:#ff6b6b}.badge.coins{color:#ffd700}.badge.wave{color:#a0d2ff}
        #overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;z-index:20;flex-direction:column;gap:12px;backdrop-filter:blur(8px)}
        #overlay h1{font-size:28px;color:#ffd700;text-shadow:0 0 20px rgba(255,215,0,.5)}
        #overlay p{color:#ccc;font-size:14px;text-align:center;padding:0 20px}
        .big-btn{background:linear-gradient(135deg,#f0a500,#ffd000);color:#000;border:none;padding:12px 30px;border-radius:30px;font-size:16px;font-weight:bold;cursor:pointer;box-shadow:0 5px 20px rgba(255,200,0,.4)}
        .big-btn:active{transform:scale(.93)}
    </style>
</head>
<body>
    <div id="container">
        <canvas id="game"></canvas>
        <div id="ui-top">
            <div class="badge hp">❤️ <span id="hp">100</span></div>
            <div class="badge coins">🪙 <span id="score">0</span></div>
            <div class="badge wave">🌊 <span id="wave">1</span></div>
        </div>
        <div id="overlay">
            <h1>⚔️ BRAWL STARS MINI</h1>
            <p>Тапай по экрану — герой идёт туда.<br>Авто-атака ближайших врагов.<br>Собирай кристаллы, выживай!</p>
            <button class="big-btn" onclick="startGame()">ИГРАТЬ</button>
        </div>
    </div>

    <script>
        const tg=window.Telegram.WebApp;tg.expand();
        const container=document.getElementById('container');
        const canvas=document.getElementById('game');
        const ctx=canvas.getContext('2d');

        let W,H; // размеры canvas в пикселях
        function resize(){
            let size=Math.min(window.innerWidth,window.innerHeight,500);
            container.style.width=size+'px';container.style.height=size+'px';
            canvas.width=size;canvas.height=size;
            W=size;H=size;
        }
        resize();window.addEventListener('resize',resize);

        // Игровые переменные
        let player={x:W/2,y:H/2,radius:W/20,speed:W/180,hp:100,maxHp:100,invincible:0};
        let enemies=[],crystals=[],obstacles=[];
        let score=0,wave=1,gameRunning=false,gameOver=false;
        let targetPoint=null; // точка, куда идёт игрок

        // Препятствия (кусты, камни)
        const obsPositions=[
            {x:0.15,y:0.2,w:0.08,h:0.08},{x:0.7,y:0.15,w:0.1,h:0.1},{x:0.4,y:0.5,w:0.12,h:0.12},
            {x:0.2,y:0.7,w:0.09,h:0.09},{x:0.75,y:0.65,w:0.08,h:0.08},{x:0.55,y:0.8,w:0.11,h:0.11},
            {x:0.85,y:0.4,w:0.07,h:0.07},{x:0.1,y:0.85,w:0.1,h:0.1}
        ];

        function createObstacles(){
            obstacles=obsPositions.map(o=>({
                x:o.x*W,y:o.y*H,w:o.w*W,h:o.h*H
            }));
        }

        function spawnCrystal(){
            let attempts=0;
            while(attempts<50){
                let cx=Math.random()*W*0.9+W*0.05;
                let cy=Math.random()*H*0.9+H*0.05;
                if(!obstacles.some(o=>cx>o.x&&cx<o.x+o.w&&cy>o.y&&cy<o.y+o.h)){
                    crystals.push({x:cx,y:cy,radius:W/60,value:10+wave*2});
                    break;
                }
                attempts++;
            }
        }

        function spawnEnemy(){
            let side=Math.floor(Math.random()*4);
            let ex,ey;
            let margin=W*0.1;
            if(side===0){ex=Math.random()*W;ey=-margin;}
            else if(side===1){ex=W+margin;ey=Math.random()*H;}
            else if(side===2){ex=Math.random()*W;ey=H+margin;}
            else{ex=-margin;ey=Math.random()*H;}
            let hp=8+wave*4;
            let speed=W/400+wave*0.02;
            enemies.push({
                x:ex,y:ey,radius:W/28,hp:hp,maxHp:hp,speed:speed,damage:5+wave*2,attackCooldown:0
            });
        }

        function startWave(){
            enemies=[];crystals=[];
            for(let i=0;i<3+wave;i++) spawnEnemy();
            for(let i=0;i<4;i++) spawnCrystal();
            wave++;
            document.getElementById('wave').textContent=wave;
        }

        function startGame(){
            player.x=W/2;player.y=H/2;player.hp=player.maxHp;player.invincible=0;
            score=0;wave=0;gameOver=false;gameRunning=true;
            targetPoint=null;
            createObstacles();
            startWave();
            document.getElementById('overlay').style.display='none';
            document.getElementById('hp').textContent=player.hp;
            document.getElementById('score').textContent=score;
        }

        function endGame(){
            gameRunning=false;gameOver=true;
            document.getElementById('overlay').innerHTML=`<h1>💀</h1><p>Волна ${wave-1}<br>Собрано кристаллов: ${score}🪙</p><button class="big-btn" onclick="startGame()">ЗАНОВО</button>`;
            document.getElementById('overlay').style.display='flex';
        }

        // Управление касанием
        canvas.addEventListener('click',(e)=>{
            if(!gameRunning)return;
            let rect=canvas.getBoundingClientRect();
            let sx=W/rect.width,sy=H/rect.height;
            let mx=(e.clientX-rect.left)*sx;
            let my=(e.clientY-rect.top)*sy;
            targetPoint={x:mx,y:my};
        });
        canvas.addEventListener('touchmove',(e)=>{
            e.preventDefault();
            if(!gameRunning)return;
            let rect=canvas.getBoundingClientRect();
            let sx=W/rect.width,sy=H/rect.height;
            let touch=e.touches[0];
            let mx=(touch.clientX-rect.left)*sx;
            let my=(touch.clientY-rect.top)*sy;
            targetPoint={x:mx,y:my};
        });

        // Игровой цикл
        function update(){
            if(!gameRunning)return;
            // Движение игрока к точке
            if(targetPoint){
                let dx=targetPoint.x-player.x;
                let dy=targetPoint.y-player.y;
                let dist=Math.hypot(dx,dy);
                if(dist>2){
                    let step=Math.min(player.speed,dist);
                    player.x+=dx/dist*step;
                    player.y+=dy/dist*step;
                }else targetPoint=null;
            }
            // Ограничение экрана
            player.x=Math.max(player.radius,Math.min(W-player.radius,player.x));
            player.y=Math.max(player.radius,Math.min(H-player.radius,player.y));
            // Столкновение с препятствиями
            obstacles.forEach(o=>{
                if(player.x+player.radius>o.x&&player.x-player.radius<o.x+o.w&&
                   player.y+player.radius>o.y&&player.y-player.radius<o.y+o.h){
                    // выталкивание
                    let cx=Math.max(o.x,Math.min(player.x,o.x+o.w));
                    let cy=Math.max(o.y,Math.min(player.y,o.y+o.h));
                    let dx=player.x-cx,dy=player.y-cy;
                    let dist=Math.hypot(dx,dy);
                    if(dist<player.radius&&dist>0){
                        player.x=cx+dx/dist*player.radius;
                        player.y=cy+dy/dist*player.radius;
                    }
                }
            });

            // Враги
            enemies.forEach(e=>{
                // Движение к игроку
                let dx=player.x-e.x,dy=player.y-e.y,dist=Math.hypot(dx,dy);
                if(dist>e.radius+player.radius){
                    e.x+=dx/dist*e.speed;
                    e.y+=dy/dist*e.speed;
                }
                // Атака игрока
                if(dist<e.radius+player.radius&&e.attackCooldown<=0){
                    if(player.invincible<=0){
                        player.hp-=e.damage;
                        player.invincible=15; // кадры неуязвимости
                    }
                    e.attackCooldown=40;
                }
                if(e.attackCooldown>0)e.attackCooldown--;
            });

            // Авто-атака игрока по ближайшему врагу
            if(enemies.length>0){
                let nearest=null,minDist=W*0.35;
                enemies.forEach(e=>{
                    let d=Math.hypot(player.x-e.x,player.y-e.y);
                    if(d<minDist){minDist=d;nearest=e;}
                });
                if(nearest){
                    // наносим урон каждые 20 кадров (имитация выстрела)
                    if(!player.attackTimer)player.attackTimer=0;
                    player.attackTimer++;
                    if(player.attackTimer>=20){
                        player.attackTimer=0;
                        nearest.hp-=15+wave;
                        // визуальный эффект: линия
                    }
                }
            }

            // Удаление мёртвых врагов
            enemies=enemies.filter(e=>{
                if(e.hp<=0){
                    score+=5+wave;
                    spawnCrystal();
                    return false;
                }
                return true;
            });

            // Сбор кристаллов
            crystals=crystals.filter(c=>{
                let d=Math.hypot(player.x-c.x,player.y-c.y);
                if(d<player.radius+c.radius){
                    score+=c.value;
                    return false;
                }
                return true;
            });

            // Неуязвимость
            if(player.invincible>0)player.invincible--;

            // Новая волна, если враги кончились
            if(enemies.length===0){
                startWave();
            }

            // Смерть
            if(player.hp<=0){
                endGame();
            }

            // UI
            document.getElementById('hp').textContent=Math.max(0,player.hp);
            document.getElementById('score').textContent=score;
        }

        function draw(){
            ctx.clearRect(0,0,W,H);
            // Трава
            ctx.fillStyle='#4caf50';
            ctx.fillRect(0,0,W,H);
            // Сетка травы (узор)
            ctx.fillStyle='#3e8e41';
            for(let i=0;i<W;i+=W/12){
                for(let j=0;j<H;j+=H/12){
                    if((i+j)%(W/6)===0)ctx.fillRect(i,j,4,4);
                }
            }
            // Препятствия (кусты)
            obstacles.forEach(o=>{
                ctx.fillStyle='#2e7d32';
                ctx.fillRect(o.x,o.y,o.w,o.h);
                ctx.fillStyle='#1b5e20';
                ctx.fillRect(o.x+2,o.y+2,o.w-4,o.h-4);
            });
            // Кристаллы
            crystals.forEach(c=>{
                ctx.fillStyle='#ffd700';
                ctx.beginPath();ctx.arc(c.x,c.y,c.radius,0,Math.PI*2);ctx.fill();
                ctx.fillStyle='#fff';
                ctx.beginPath();ctx.arc(c.x-c.radius*0.3,c.y-c.radius*0.3,c.radius*0.4,0,Math.PI*2);ctx.fill();
            });
            // Враги
            enemies.forEach(e=>{
                ctx.fillStyle='#d32f2f';
                ctx.beginPath();ctx.arc(e.x,e.y,e.radius,0,Math.PI*2);ctx.fill();
                ctx.fillStyle='#b71c1c';
                ctx.beginPath();ctx.arc(e.x,e.y,e.radius*0.7,0,Math.PI*2);ctx.fill();
                // Глаза
                ctx.fillStyle='#fff';
                ctx.beginPath();ctx.arc(e.x-e.radius*0.3,e.y-e.radius*0.2,e.radius*0.25,0,Math.PI*2);ctx.fill();
                ctx.beginPath();ctx.arc(e.x+e.radius*0.3,e.y-e.radius*0.2,e.radius*0.25,0,Math.PI*2);ctx.fill();
                ctx.fillStyle='#000';
                ctx.beginPath();ctx.arc(e.x-e.radius*0.3,e.y-e.radius*0.2,e.radius*0.1,0,Math.PI*2);ctx.fill();
                ctx.beginPath();ctx.arc(e.x+e.radius*0.3,e.y-e.radius*0.2,e.radius*0.1,0,Math.PI*2);ctx.fill();
                // HP bar
                let hpW=e.radius*1.2;
                ctx.fillStyle='#333';
                ctx.fillRect(e.x-hpW/2,e.y-e.radius-8,hpW,4);
                ctx.fillStyle='#ff4444';
                ctx.fillRect(e.x-hpW/2,e.y-e.radius-8,hpW*(e.hp/e.maxHp),4);
            });
            // Игрок
            if(player.invincible%6<3){ // мерцание при неуязвимости
                ctx.fillStyle='#2196F3';
                ctx.beginPath();ctx.arc(player.x,player.y,player.radius,0,Math.PI*2);ctx.fill();
                ctx.fillStyle='#1565C0';
                ctx.beginPath();ctx.arc(player.x,player.y,player.radius*0.7,0,Math.PI*2);ctx.fill();
                // шлем
                ctx.fillStyle='#fff';
                ctx.beginPath();ctx.arc(player.x,player.y-player.radius*0.25,player.radius*0.55,Math.PI,0);ctx.fill();
                ctx.fillStyle='#2196F3';
                ctx.beginPath();ctx.arc(player.x,player.y-player.radius*0.15,player.radius*0.3,Math.PI,0);ctx.fill();
                // глаза
                ctx.fillStyle='#fff';
                ctx.beginPath();ctx.arc(player.x-player.radius*0.3,player.y-player.radius*0.2,player.radius*0.2,0,Math.PI*2);ctx.fill();
                ctx.beginPath();ctx.arc(player.x+player.radius*0.3,player.y-player.radius*0.2,player.radius*0.2,0,Math.PI*2);ctx.fill();
                ctx.fillStyle='#000';
                ctx.beginPath();ctx.arc(player.x-player.radius*0.3,player.y-player.radius*0.2,player.radius*0.08,0,Math.PI*2);ctx.fill();
                ctx.beginPath();ctx.arc(player.x+player.radius*0.3,player.y-player.radius*0.2,player.radius*0.08,0,Math.PI*2);ctx.fill();
            }
        }

        function loop(){
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
</body>
</html>
