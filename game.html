<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Бизнес Магнат</title>
    <style>
        :root {
            --bg: #0f1119;
            --card: #1a1d2e;
            --gold: #ffc107;
            --accent: #4caf84;
            --text: #e0e0e0;
            --sub: #8a8fa0;
            --danger: #e05050;
            --border: #2a2d3e;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
            background:var(--bg);
            color:var(--text);
            height:100dvh;
            display:flex;
            justify-content:center;
            align-items:center;
            user-select:none;
            -webkit-user-select:none;
            -webkit-tap-highlight-color:transparent;
            overflow:hidden;
        }
        #app{
            width:100%;
            max-width:480px;
            height:100dvh;
            display:flex;
            flex-direction:column;
            background:linear-gradient(180deg, #141729 0%, #0f1119 100%);
            position:relative;
            overflow:hidden;
        }
        .header{
            padding:16px 20px 8px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            z-index:10;
        }
        .balance-block{
            text-align:center;
            flex:1;
        }
        .balance-label{
            font-size:11px;
            color:var(--sub);
            text-transform:uppercase;
            letter-spacing:1px;
        }
        .balance{
            font-size:36px;
            font-weight:700;
            color:var(--gold);
            text-shadow:0 0 20px rgba(255,193,7,.3);
            transition:transform .15s;
        }
        .balance.pulse{transform:scale(1.05)}
        .income{
            font-size:12px;
            color:var(--accent);
            margin-top:2px;
        }
        .main-area{
            flex:1;
            display:flex;
            align-items:center;
            justify-content:center;
            position:relative;
            min-height:200px;
        }
        .clicker{
            width:140px;
            height:140px;
            border-radius:50%;
            background:radial-gradient(circle at 40% 35%, #5c6bc0, #283593);
            box-shadow:0 8px 32px rgba(92,107,192,.35), inset 0 -4px 8px rgba(0,0,0,.3);
            cursor:pointer;
            transition:transform .12s cubic-bezier(.18,.89,.32,1.28);
            display:flex;
            align-items:center;
            justify-content:center;
            position:relative;
        }
        .clicker:active{transform:scale(.9)}
        .clicker svg{width:60px;height:60px;fill:white;opacity:.9}
        .float-text{
            position:absolute;
            font-weight:700;
            font-size:20px;
            color:var(--gold);
            pointer-events:none;
            animation:floatUp .9s ease-out forwards;
        }
        @keyframes floatUp{
            0%{opacity:1;transform:translateY(0) scale(1)}
            100%{opacity:0;transform:translateY(-80px) scale(1.3)}
        }
        .business-list{
            flex:1;
            overflow-y:auto;
            padding:8px 16px 16px;
            display:flex;
            flex-direction:column;
            gap:8px;
            -webkit-overflow-scrolling:touch;
        }
        .business-card{
            background:var(--card);
            border-radius:14px;
            padding:14px 16px;
            display:flex;
            align-items:center;
            gap:12px;
            border:1px solid var(--border);
            cursor:pointer;
            transition:all .2s;
            position:relative;
            overflow:hidden;
        }
        .business-card:active{background:#1f2240;border-color:#3a3d5c}
        .business-card.owned{border-color:#4caf8470}
        .business-icon{
            width:46px;height:46px;border-radius:12px;
            display:flex;align-items:center;justify-content:center;
            font-size:22px;flex-shrink:0;
        }
        .business-info{flex:1;min-width:0}
        .business-name{font-weight:600;font-size:14px;margin-bottom:2px}
        .business-income{font-size:11px;color:var(--accent)}
        .business-count{font-size:12px;color:var(--sub)}
        .business-cost{
            font-weight:700;font-size:14px;color:var(--gold);
            white-space:nowrap;
        }
        .progress-bar{
            position:absolute;bottom:0;left:0;height:3px;
            background:var(--accent);transition:width .3s;border-radius:0 2px 2px 0;
        }
        .tabs{
            display:flex;gap:0;padding:0 16px;margin-bottom:4px;
        }
        .tab{
            flex:1;text-align:center;padding:10px 0;font-size:13px;
            color:var(--sub);border-bottom:2px solid transparent;
            cursor:pointer;transition:all .2s;
        }
        .tab.active{color:var(--gold);border-bottom-color:var(--gold)}
        .manager-card{
            background:var(--card);border-radius:12px;padding:12px;
            border:1px solid var(--border);display:flex;align-items:center;
            gap:10px;margin-bottom:8px;
        }
        .manager-avatar{
            width:40px;height:40px;border-radius:50%;
            display:flex;align-items:center;justify-content:center;
            font-size:18px;flex-shrink:0;
        }
        .notification{
            position:fixed;top:20px;left:50%;transform:translateX(-50%);
            background:#222640;color:#fff;padding:10px 20px;border-radius:20px;
            font-size:13px;z-index:100;animation:slideDown .4s ease-out;
            box-shadow:0 4px 16px rgba(0,0,0,.5);
        }
        @keyframes slideDown{
            0%{opacity:0;transform:translateX(-50%) translateY(-30px)}
            100%{opacity:1;transform:translateX(-50%) translateY(0)}
        }
        .particle{
            position:absolute;pointer-events:none;
            width:6px;height:6px;border-radius:50%;
            animation:particleFly .6s ease-out forwards;
        }
        @keyframes particleFly{
            0%{opacity:1;transform:translate(0,0) scale(1)}
            100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}
        }
        ::-webkit-scrollbar{width:0}
    </style>
</head>
<body>
<div id="app">
    <div class="header">
        <div class="balance-block">
            <div class="balance-label">Баланс</div>
            <div class="balance" id="balance">0</div>
            <div class="income" id="income">+0/сек</div>
        </div>
    </div>
    <div class="main-area" id="mainArea">
        <div class="clicker" id="clicker">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
        </div>
    </div>
    <div class="tabs">
        <div class="tab active" onclick="switchTab('business')">Бизнес</div>
        <div class="tab" onclick="switchTab('managers')">Менеджеры</div>
    </div>
    <div class="business-list" id="businessList"></div>
</div>
<script>
const game = {
    money: 0,
    totalEarned: 0,
    incomePerSec: 0,
    clickValue: 1,
    businesses: [
        {id:'stand',name:'Лимонадный стенд',icon:'#ff9800',baseCost:10,cost:10,income:0.5,owned:0,color:'#ff980030'},
        {id:'shop',name:'Магазин',icon:'#2196f3',baseCost:80,cost:80,income:4,owned:0,color:'#2196f330'},
        {id:'cafe',name:'Кафе',icon:'#e91e63',baseCost:500,cost:500,income:20,owned:0,color:'#e91e6330'},
        {id:'factory',name:'Фабрика',icon:'#607d8b',baseCost:3000,cost:3000,income:100,owned:0,color:'#607d8b30'},
        {id:'bank',name:'Банк',icon:'#ffc107',baseCost:20000,cost:20000,income:600,owned:0,color:'#ffc10730'},
        {id:'airport',name:'Аэропорт',icon:'#00bcd4',baseCost:150000,cost:150000,income:4000,owned:0,color:'#00bcd430'},
        {id:'city',name:'Небоскрёб',icon:'#9c27b0',baseCost:1000000,cost:1000000,income:25000,owned:0,color:'#9c27b030'},
        {id:'island',name:'Остров',icon:'#4caf84',baseCost:8000000,cost:8000000,income:150000,owned:0,color:'#4caf8430'},
    ],
    managers: [
        {id:'mgr1',name:'Продавец',icon:'👤',businessId:'stand',cost:50,owned:false,color:'#ff9800'},
        {id:'mgr2',name:'Бариста',icon:'👤',businessId:'shop',cost:300,owned:false,color:'#2196f3'},
        {id:'mgr3',name:'Шеф-повар',icon:'👤',businessId:'cafe',cost:2000,owned:false,color:'#e91e63'},
        {id:'mgr4',name:'Инженер',icon:'👤',businessId:'factory',cost:12000,owned:false,color:'#607d8b'},
    ],
    currentTab:'business'
};

function save(){localStorage.setItem('magnatSave',JSON.stringify({money:game.money,totalEarned:game.totalEarned,incomePerSec:game.incomePerSec,clickValue:game.clickValue,businesses:game.businesses.map(b=>({id:b.id,owned:b.owned,cost:b.cost})),managers:game.managers}));}
function load(){
    const d=localStorage.getItem('magnatSave');
    if(!d)return;
    const s=JSON.parse(d);
    game.money=s.money;game.totalEarned=s.totalEarned;game.incomePerSec=s.incomePerSec;game.clickValue=s.clickValue;
    s.businesses.forEach(sb=>{const b=game.businesses.find(x=>x.id===sb.id);if(b){b.owned=sb.owned;b.cost=sb.cost}});
    if(s.managers)game.managers=s.managers;
}

function switchTab(t){game.currentTab=t;document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',(i===0&&t==='business')||(i===1&&t==='managers')));renderList();}

function buyBusiness(id){
    const b=game.businesses.find(x=>x.id===id);
    if(!b||game.money<b.cost)return notify('Недостаточно средств');
    game.money-=b.cost;b.owned++;game.incomePerSec+=b.income;
    b.cost=Math.floor(b.baseCost*Math.pow(1.12,b.owned));
    game.clickValue=1+Math.floor(game.totalEarned/1000);
    save();updateUI();renderList();
}

function buyManager(id){
    const m=game.managers.find(x=>x.id===id);
    if(!m||m.owned||game.money<m.cost)return notify(m&&m.owned?'Уже нанят':'Недостаточно средств');
    game.money-=m.cost;m.owned=true;
    const b=game.businesses.find(x=>x.id===m.businessId);
    if(b)game.incomePerSec+=b.income*Math.max(1,b.owned);
    save();updateUI();renderList();
}

function notify(msg){
    const el=document.createElement('div');el.className='notification';el.textContent=msg;
    document.body.appendChild(el);setTimeout(()=>el.remove(),2000);
}

function formatMoney(n){
    if(n>=1e9)return (n/1e9).toFixed(2)+'B';
    if(n>=1e6)return (n/1e6).toFixed(2)+'M';
    if(n>=1e3)return (n/1e3).toFixed(1)+'K';
    return Math.floor(n).toString();
}

function updateUI(){
    const bal=document.getElementById('balance');
    bal.textContent=formatMoney(game.money);
    bal.classList.add('pulse');setTimeout(()=>bal.classList.remove('pulse'),150);
    document.getElementById('income').textContent='+'+formatMoney(game.incomePerSec)+'/сек';
}

function renderList(){
    const list=document.getElementById('businessList');
    if(game.currentTab==='business'){
        list.innerHTML=game.businesses.map(b=>{
            const canBuy=game.money>=b.cost;
            const progress=b.owned>0?(game.incomePerSec?Math.min(100,(b.income*b.owned/game.incomePerSec*100)):0):0;
            return`<div class="business-card${b.owned>0?' owned':''}" onclick="buyBusiness('${b.id}')">
                <div class="business-icon" style="background:${b.color}">${String.fromCharCode(9733+game.businesses.indexOf(b))}</div>
                <div class="business-info">
                    <div class="business-name">${b.name}</div>
                    <div class="business-income">+${formatMoney(b.income)}/сек</div>
                    <div class="business-count">${b.owned>0?'Владею: '+b.owned:''}</div>
                </div>
                <div class="business-cost" style="color:${canBuy?'var(--gold)':'var(--sub)'}">${formatMoney(b.cost)}</div>
                ${b.owned>0?`<div class="progress-bar" style="width:${progress}%"></div>`:''}
            </div>`;
        }).join('');
    }else{
        list.innerHTML=game.managers.map(m=>{
            const b=game.businesses.find(x=>x.id===m.businessId);
            const canBuy=!m.owned&&game.money>=m.cost;
            return`<div class="manager-card" onclick="buyManager('${m.id}')">
                <div class="manager-avatar" style="background:${m.color}30">${String.fromCharCode(9786+game.managers.indexOf(m))}</div>
                <div style="flex:1"><div style="font-weight:600;font-size:13px">${m.name}</div><div style="font-size:11px;color:var(--sub)">Автоматизирует ${b?b.name:''}</div></div>
                <div class="business-cost" style="color:${m.owned?'var(--accent)':canBuy?'var(--gold)':'var(--sub)'}">${m.owned?'Нанят':formatMoney(m.cost)}</div>
            </div>`;
        }).join('');
    }
}

// Клик
document.getElementById('clicker').addEventListener('click',function(e){
    game.money+=game.clickValue;game.totalEarned+=game.clickValue;
    updateUI();renderList();save();
    // Анимация
    const ft=document.createElement('div');ft.className='float-text';ft.textContent='+'+formatMoney(game.clickValue);
    const rect=this.getBoundingClientRect();
    ft.style.left=(e.clientX-rect.left-20)+'px';ft.style.top=(e.clientY-rect.top-30)+'px';
    document.getElementById('mainArea').appendChild(ft);setTimeout(()=>ft.remove(),900);
    // Частицы
    for(let i=0;i<6;i++){
        const p=document.createElement('div');p.className='particle';
        p.style.cssText=`--dx:${(Math.random()-.5)*80}px;--dy:${(Math.random()-.5)*80}px;background:#ffc107;left:${e.clientX-rect.left}px;top:${e.clientY-rect.top}px`;
        document.getElementById('mainArea').appendChild(p);setTimeout(()=>p.remove(),600);
    }
});

// Автодоход
setInterval(()=>{
    if(game.incomePerSec>0){game.money+=game.incomePerSec/10;game.totalEarned+=game.incomePerSec/10}
    updateUI();
},100);

// Автосохранение
setInterval(save,5000);

// Менеджеры работают
setInterval(()=>{
    game.managers.forEach(m=>{
        if(!m.owned)return;
        const b=game.businesses.find(x=>x.id===m.businessId);
        if(b&&b.owned>0){game.money+=b.income*b.owned/2;game.totalEarned+=b.income*b.owned/2}
    });
},1000);

// Инициализация
load();updateUI();renderList();
</script>
</body>
</html>
