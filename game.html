<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Бизнес Магнат</title>
    <style>
        :root {
            --bg: #0a0c14; --card: #141829; --gold: #f0b90b; --accent: #4caf84;
            --text: #e8e8ee; --sub: #7a7f92; --border: #1e2235;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Segoe UI',system-ui,sans-serif;
            background:var(--bg);color:var(--text);
            height:100dvh;display:flex;justify-content:center;align-items:center;
            user-select:none;-webkit-user-select:none;
            -webkit-tap-highlight-color:transparent;overflow:hidden;
        }
        #app{
            width:100%;max-width:480px;height:100dvh;
            display:flex;flex-direction:column;
            background:linear-gradient(180deg, #10142a 0%, #0a0c14 100%);
            position:relative;overflow:hidden;
        }
        .header{
            padding:12px 16px 6px;display:flex;align-items:center;gap:10px;
            z-index:10;background:rgba(10,12,20,.8);backdrop-filter:blur(10px);
        }
        .balance{
            font-size:32px;font-weight:800;color:var(--gold);
            text-shadow:0 0 20px rgba(240,185,11,.25);line-height:1;
        }
        .income-badge{
            font-size:11px;color:var(--accent);background:rgba(76,175,132,.1);
            padding:3px 8px;border-radius:10px;font-weight:600;margin-left:8px;
        }
        .main-area{
            flex:1;display:flex;align-items:center;justify-content:center;
            position:relative;min-height:180px;
        }
        .clicker{
            width:130px;height:130px;border-radius:50%;
            background:radial-gradient(circle at 40% 35%, #5c6bc0, #1a237e);
            box-shadow:0 0 40px rgba(92,107,192,.4),inset 0 -4px 8px rgba(0,0,0,.3);
            cursor:pointer;transition:transform .1s;
            display:flex;align-items:center;justify-content:center;
        }
        .clicker:active{transform:scale(.88)}
        .clicker svg{width:50px;height:50px;fill:rgba(255,255,255,.85)}
        .float-text{
            position:absolute;font-weight:800;font-size:22px;color:var(--gold);
            pointer-events:none;animation:floatUp .8s ease-out forwards;
            text-shadow:0 0 12px rgba(240,185,11,.6);z-index:20;
        }
        @keyframes floatUp{
            0%{opacity:1;transform:translate(-50%,0) scale(1)}
            100%{opacity:0;transform:translate(-50%,-90px) scale(1.4)}
        }
        .tabs{display:flex;padding:0 12px;gap:4px}
        .tab{
            flex:1;text-align:center;padding:10px 0;font-size:12px;font-weight:600;
            color:var(--sub);border-bottom:2px solid transparent;cursor:pointer;
        }
        .tab.active{color:var(--gold);border-bottom-color:var(--gold)}
        .list-area{
            flex:1;overflow-y:auto;padding:8px 12px 12px;
            -webkit-overflow-scrolling:touch;display:flex;flex-direction:column;gap:7px;
        }
        .biz-card{
            background:var(--card);border-radius:14px;padding:14px;
            display:flex;align-items:center;gap:12px;border:1px solid var(--border);
            cursor:pointer;transition:all .18s;
        }
        .biz-card:active{background:#1c2140}
        .biz-icon{
            width:44px;height:44px;border-radius:12px;display:flex;
            align-items:center;justify-content:center;font-size:18px;
            font-weight:700;flex-shrink:0;color:#fff;
        }
        .biz-info{flex:1;min-width:0}
        .biz-name{font-weight:600;font-size:13px}
        .biz-meta{font-size:10px;color:var(--sub)}
        .biz-cost{font-weight:700;font-size:13px;white-space:nowrap}
        .mgr-card{
            background:var(--card);border-radius:12px;padding:12px;
            border:1px solid var(--border);display:flex;align-items:center;
            gap:10px;cursor:pointer;
        }
        .mgr-card:active{background:#1c2140}
        .mgr-avatar{
            width:38px;height:38px;border-radius:50%;display:flex;
            align-items:center;justify-content:center;font-size:16px;
            flex-shrink:0;color:#fff;font-weight:700;
        }
        .toast{
            position:fixed;top:60px;left:50%;transform:translateX(-50%);
            background:#1a1f35;color:#fff;padding:10px 20px;border-radius:16px;
            font-size:13px;font-weight:600;z-index:200;border:1px solid var(--gold);
            animation:toastIn .4s ease-out;
        }
        @keyframes toastIn{0%{opacity:0;transform:translateX(-50%) translateY(-20px)}100%{opacity:1;transform:translateX(-50%) translateY(0)}}
    </style>
</head>
<body>
<div id="app">
    <div class="header">
        <div class="balance" id="balance">0</div>
        <div class="income-badge" id="incomeBadge">+0/с</div>
    </div>
    <div class="main-area" id="mainArea">
        <div class="clicker" id="clicker">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
        </div>
    </div>
    <div class="tabs">
        <div class="tab active" id="tabBiz" onclick="switchTab('biz')">Бизнес</div>
        <div class="tab" id="tabMgr" onclick="switchTab('mgr')">Менеджеры</div>
    </div>
    <div class="list-area" id="listArea"></div>
</div>
<script>
let money=0,incomePerSec=0,clickValue=1,totalEarned=0,tab='biz';
let businesses=[
    {id:'stand',name:'Стенд',icon:'L',baseCost:10,cost:10,income:0.5,owned:0,color:'#ff9800'},
    {id:'shop',name:'Магазин',icon:'M',baseCost:80,cost:80,income:4,owned:0,color:'#2196f3'},
    {id:'cafe',name:'Кафе',icon:'C',baseCost:500,cost:500,income:20,owned:0,color:'#e91e63'},
    {id:'factory',name:'Фабрика',icon:'F',baseCost:3000,cost:3000,income:100,owned:0,color:'#607d8b'},
    {id:'bank',name:'Банк',icon:'B',baseCost:20000,cost:20000,income:600,owned:0,color:'#ffc107'},
    {id:'airport',name:'Аэропорт',icon:'A',baseCost:150000,cost:150000,income:4000,owned:0,color:'#00bcd4'},
    {id:'city',name:'Небоскрёб',icon:'N',baseCost:1e6,cost:1e6,income:25000,owned:0,color:'#9c27b0'},
    {id:'island',name:'Остров',icon:'O',baseCost:8e6,cost:8e6,income:150000,owned:0,color:'#4caf84'}
];
let managers=[
    {id:'m1',name:'Продавец',bizId:'stand',cost:50,owned:false,color:'#ff9800'},
    {id:'m2',name:'Бариста',bizId:'shop',cost:300,owned:false,color:'#2196f3'},
    {id:'m3',name:'Шеф',bizId:'cafe',cost:2000,owned:false,color:'#e91e63'},
    {id:'m4',name:'Инженер',bizId:'factory',cost:12000,owned:false,color:'#607d8b'},
    {id:'m5',name:'Директор',bizId:'bank',cost:80000,owned:false,color:'#ffc107'}
];

function fm(n){if(n>=1e9)return (n/1e9).toFixed(1)+'B';if(n>=1e6)return (n/1e6).toFixed(1)+'M';if(n>=1e3)return (n/1e3).toFixed(1)+'K';return Math.floor(n).toLocaleString()}

function updateUI(){
    document.getElementById('balance').textContent=fm(money);
    document.getElementById('incomeBadge').textContent='+'+fm(incomePerSec)+'/с';
}

function notify(msg){
    const el=document.createElement('div');el.className='toast';el.textContent=msg;
    document.body.appendChild(el);setTimeout(()=>el.remove(),2000);
}

function switchTab(t){
    tab=t;
    document.getElementById('tabBiz').classList.toggle('active',t==='biz');
    document.getElementById('tabMgr').classList.toggle('active',t==='mgr');
    render();
}

function buyBiz(id){
    const b=businesses.find(x=>x.id===id);
    if(!b||money<b.cost)return;
    money-=b.cost;b.owned++;incomePerSec+=b.income;totalEarned+=b.cost;
    b.cost=Math.floor(b.baseCost*Math.pow(1.12,b.owned));
    clickValue=1+Math.floor(totalEarned/500);
    updateUI();render();
}

function buyMgr(id){
    const m=managers.find(x=>x.id===id);
    if(!m||m.owned||money<m.cost)return;
    money-=m.cost;m.owned=true;
    const b=businesses.find(x=>x.id===m.bizId);
    if(b)incomePerSec+=b.income*Math.max(1,b.owned);
    updateUI();render();
}

function render(){
    const area=document.getElementById('listArea');
    if(tab==='biz'){
        area.innerHTML=businesses.map(b=>`<div class="biz-card" onclick="buyBiz('${b.id}')"><div class="biz-icon" style="background:${b.color}40;color:${b.color}">${b.icon}</div><div class="biz-info"><div class="biz-name">${b.name}</div><div class="biz-meta">+${fm(b.income)}/с • ${b.owned} шт</div></div><div class="biz-cost" style="color:${money>=b.cost?'var(--gold)':'var(--sub)'}">${fm(b.cost)}</div></div>`).join('');
    }else{
        area.innerHTML=managers.map(m=>{const canBuy=!m.owned&&money>=m.cost;const b=businesses.find(x=>x.id===m.bizId);return`<div class="mgr-card" onclick="buyMgr('${m.id}')"><div class="mgr-avatar" style="background:${m.color}30;color:${m.color}">${m.name[0]}</div><div style="flex:1"><div style="font-weight:600;font-size:13px">${m.name}</div><div style="font-size:10px;color:var(--sub)">Авто: ${b?b.name:''}</div></div><div style="font-weight:700;font-size:13px;color:${m.owned?'var(--accent)':canBuy?'var(--gold)':'var(--sub)'}">${m.owned?'Нанят':fm(m.cost)}</div></div>`}).join('');
    }
}

// Клик
document.getElementById('clicker').addEventListener('click',function(e){
    money+=clickValue;totalEarned+=clickValue;
    updateUI();render();
    const rect=this.getBoundingClientRect();
    const cx=rect.left+rect.width/2,cy=rect.top;
    const ft=document.createElement('div');ft.className='float-text';
    ft.textContent='+'+fm(clickValue);ft.style.left=cx+'px';ft.style.top=cy+'px';
    document.getElementById('mainArea').appendChild(ft);setTimeout(()=>ft.remove(),800);
});

// Доход
setInterval(()=>{if(incomePerSec>0){money+=incomePerSec/20;totalEarned+=incomePerSec/20}updateUI()},50);

// Менеджеры
setInterval(()=>{managers.forEach(m=>{if(!m.owned)return;const b=businesses.find(x=>x.id===m.bizId);if(b&&b.owned>0){money+=b.income*b.owned/4;totalEarned+=b.income*b.owned/4}})},1000);

updateUI();render();
</script>
</body>
</html>
